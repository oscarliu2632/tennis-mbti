<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎾 网球人格鉴定局 — 你到底是什么球场奇葩？</title>
<style>
  :root {
    --green: #2ecc71; --orange: #e67e22; --blue: #3498db; --red: #e74c3c;
    --purple: #9b59b6; --yellow: #f1c40f; --pink: #e91e63; --teal: #1abc9c;
    --bg: #fef9e7; --card: #ffffff; --text: #2c3e50; --muted: #95a5a6;
    --dim1: #e74c3c; --dim2: #e67e22; --dim3: #2ecc71; --dim4: #3498db;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
    background: linear-gradient(180deg, #e8f8f5 0%, #fef9e7 30%, #fdebd0 70%, #e8f8f5 100%);
    min-height: 100vh;
    color: var(--text);
    line-height: 1.6;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(circle at 15% 20%, rgba(231,76,60,0.04) 0%, transparent 50%),
                radial-gradient(circle at 85% 75%, rgba(46,204,113,0.04) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(241,196,15,0.03) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  .container { max-width: 780px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

  /* --- 头部 --- */
  .hero { text-align: center; padding: 30px 20px 20px; }
  .hero .ball { font-size: 72px; display: block; animation: bounceHero 1.5s ease-in-out infinite; }
  @keyframes bounceHero {
    0%,100% { transform: translateY(0) rotate(0deg); }
    30% { transform: translateY(-24px) rotate(20deg); }
    60% { transform: translateY(0) rotate(-15deg); }
  }
  .hero h1 {
    font-size: 2em;
    background: linear-gradient(135deg, var(--red), var(--orange), var(--green), var(--blue));
    background-size: 300% 300%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 4s ease infinite;
    margin: 10px 0;
  }
  @keyframes gradientShift {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .hero .tagline { color: var(--muted); font-size: 1em; }

  /* --- 卡片 --- */
  .card {
    background: var(--card); border-radius: 20px; padding: 28px 24px;
    margin: 14px 0; box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    border: 1px solid rgba(0,0,0,0.04);
    transition: all 0.3s;
  }

  /* --- 介绍页 --- */
  .dim-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
  @media (max-width: 600px) { .dim-grid { grid-template-columns: repeat(2, 1fr); } }
  .dim-item { text-align: center; padding: 14px 8px; border-radius: 14px; background: #f8f9fa; transition: transform 0.2s; }
  .dim-item:hover { transform: translateY(-3px); }
  .dim-item .di-emoji { font-size: 2em; display: block; }
  .dim-item .di-label { font-size: 0.85em; color: #555; margin-top: 4px; font-weight: 600; }
  .dim-item .di-pair { font-size: 0.75em; color: #999; margin-top: 2px; }

  .btn {
    display: inline-block; padding: 14px 36px; border: none; border-radius: 50px;
    font-size: 1.05em; font-weight: 700; cursor: pointer; transition: all 0.25s;
    font-family: inherit; letter-spacing: 0.5px;
  }
  .btn-go {
    background: linear-gradient(135deg, var(--orange), var(--red));
    color: #fff; box-shadow: 0 6px 20px rgba(231,76,60,0.35);
    font-size: 1.2em; padding: 16px 50px;
  }
  .btn-go:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(231,76,60,0.45); }
  .btn-nav {
    background: #fff; color: var(--text); border: 2px solid #ddd;
  }
  .btn-nav:hover { border-color: var(--blue); color: var(--blue); }
  .btn-nav:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }
  .btn-restart {
    display: block; margin: 30px auto 60px; background: linear-gradient(135deg, var(--blue), var(--purple));
    color: #fff; box-shadow: 0 6px 20px rgba(52,152,219,0.3);
  }

  /* --- 进度条 --- */
  .progress-wrap { margin: 0 0 20px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.85em; color: #888; margin-bottom: 6px; }
  .progress-track { height: 10px; border-radius: 5px; background: #eee; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg, var(--green), var(--teal)); transition: width 0.4s ease; }

  /* --- 问题区域 --- */
  .q-slide { display: none; animation: slideUp 0.4s ease; }
  .q-slide.active { display: block; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

  .q-badge { display: inline-block; background: var(--yellow); color: #333; font-weight: 700; padding: 5px 16px; border-radius: 20px; font-size: 0.8em; margin-bottom: 10px; }
  .q-title { font-size: 1.25em; font-weight: 700; margin-bottom: 18px; line-height: 1.5; }

  .opts { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px;
    border: 2px solid #e8e8e8; border-radius: 14px; background: #fafafa;
    cursor: pointer; transition: all 0.2s; text-align: left; font-family: inherit;
    font-size: 0.95em; color: var(--text);
  }
  .opt-btn:hover { border-color: var(--teal); background: #e8f8f5; transform: translateX(3px); }
  .opt-btn.selected { border-color: var(--teal); background: #d5f5e3; font-weight: 600; box-shadow: 0 2px 12px rgba(26,188,156,0.15); }
  .opt-emoji { font-size: 1.8em; flex-shrink: 0; width: 40px; text-align: center; }
  .opt-tag { display: inline-block; background: #eee; color: #888; font-size: 0.7em; padding: 2px 8px; border-radius: 10px; margin-left: 6px; font-weight: 400; }

  .nav-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 22px; gap: 10px;
  }
  .q-dots { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
  .q-dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; transition: all 0.3s; }
  .q-dot.done { background: var(--green); }
  .q-dot.current { background: var(--orange); transform: scale(1.5); }

  /* —— 手机端固定底部导航 —— */
  @media (max-width: 768px) {
    .nav-row {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 12px 16px; margin: 0;
      border-top: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 -2px 16px rgba(0,0,0,0.06);
    }
    .nav-row .btn-nav {
      padding: 12px 20px; font-size: 0.95em;
      min-width: 85px; text-align: center;
    }
    .nav-row .q-dots { display: none; }
    #testPage .card { padding-bottom: 85px; }
    .btn-go { padding: 16px 40px; font-size: 1.1em; }
    .btn-restart {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100;
      margin: 0; white-space: nowrap;
    }
    #resultPage { padding-bottom: 100px; }
    .opt-btn { padding: 16px 14px; font-size: 1em; }
    .opt-emoji { font-size: 2em; width: 44px; }
  }

  /* --- 结果页 --- */
  .result-wrap { display: none; }
  .result-wrap.show { display: block; animation: slideUp 0.6s ease; }

  .result-hero {
    text-align: center; padding: 36px 20px; border-radius: 20px;
    background: linear-gradient(135deg, #2c3e50, #34495e);
    color: #fff; margin-bottom: 20px;
  }
  .result-hero .r-emoji { font-size: 80px; display: block; }
  .result-hero .r-type { font-size: 2.6em; font-weight: 900; letter-spacing: 2px; margin: 8px 0; }
  .result-hero .r-name { font-size: 1.6em; font-weight: 700; color: var(--yellow); }
  .result-hero .r-tagline { font-size: 0.9em; color: #bbb; margin-top: 4px; font-style: italic; }

  .dim-bars { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 500px) { .dim-bars { grid-template-columns: 1fr; } }
  .dim-bar-card { background: #fff; border-radius: 14px; padding: 14px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .dim-bar-card .dbc-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .dim-bar-card .dbc-label { font-size: 0.85em; font-weight: 700; }
  .dim-bar-card .dbc-result { font-size: 0.8em; color: #888; }
  .dim-bar-card .dbc-bar { height: 8px; border-radius: 4px; background: #eee; overflow: hidden; }
  .dim-bar-card .dbc-fill { height: 100%; border-radius: 4px; transition: width 1.2s cubic-bezier(0.16, 0.68, 0.18, 1.02); }

  .desc-card { background: #fffdf5; border-radius: 14px; padding: 20px 22px; border: 2px dashed var(--yellow); margin-top: 16px; }
  .desc-card h3 { color: var(--orange); margin-bottom: 8px; }
  .desc-card p { line-height: 1.8; }

  .metaphor-card { background: #f0f4ff; border-radius: 14px; padding: 18px 22px; margin-top: 12px; text-align: center; }
  .metaphor-card .m-row { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 8px; }
  .metaphor-card .m-item { text-align: center; }
  .metaphor-card .m-item .m-icon { font-size: 2.2em; }
  .metaphor-card .m-item .m-label { font-size: 0.8em; color: #888; }

  .hidden { display: none !important; }

  /* 装饰小球 */
  .float-ball {
    position: fixed; font-size: 28px; pointer-events: none; z-index: 0;
    animation: floatAround 8s ease-in-out infinite; opacity: 0.5;
  }
  @keyframes floatAround {
    0%,100% { transform: translate(0, 0) rotate(0deg); }
    25% { transform: translate(30px, -40px) rotate(90deg); }
    50% { transform: translate(-20px, -80px) rotate(180deg); }
    75% { transform: translate(-40px, -30px) rotate(270deg); }
  }

  .confetti { position: fixed; pointer-events: none; z-index: 999; font-size: 36px; animation: confettiFall 3s ease-out forwards; }
  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(-100px) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(110vh) rotate(720deg) scale(0.3); }
  }
</style>
</head>
<body>

<div class="float-ball" style="top:8%;left:5%;animation-delay:0s;">🎾</div>
<div class="float-ball" style="top:20%;right:6%;animation-delay:2.5s;">🎾</div>
<div class="float-ball" style="bottom:15%;left:7%;animation-delay:5s;">🎾</div>

<div class="container">

  <!-- ==================== 介绍页 ==================== -->
  <div id="introPage">
    <div class="hero">
      <span class="ball">🎾</span>
      <h1>网球人格鉴定局</h1>
      <p class="tagline">🔬 专业鉴定你在球场上的真实面目 —— 不保证科学，但保证好笑</p>
    </div>

    <div class="card" style="text-align:center;">
      <div class="dim-grid">
        <div class="dim-item">
          <span class="di-emoji">🎉</span>
          <span class="di-label">社交模式</span>
          <span class="di-pair">组局狂魔 vs 独自美丽</span>
        </div>
        <div class="dim-item">
          <span class="di-emoji">⚔️</span>
          <span class="di-label">战斗风格</span>
          <span class="di-pair">暴力输出 vs 优雅艺术</span>
        </div>
        <div class="dim-item">
          <span class="di-emoji">🏆</span>
          <span class="di-label">胜负执念</span>
          <span class="di-pair">胜负欲爆棚 vs 佛系养生</span>
        </div>
        <div class="dim-item">
          <span class="di-emoji">📋</span>
          <span class="di-label">训练模式</span>
          <span class="di-pair">计划狂魔 vs 随缘玩家</span>
        </div>
      </div>
      <p style="color:#888; margin:10px 0;">
        📝 20道灵魂拷问 · ⏱ 约3分钟 · 🎭 16种球场奇葩人格<br>
        <small>每道题四个选项，请凭第一直觉作答，思前想后就不准了！</small>
      </p>
      <button class="btn btn-go" onclick="start()">🔪 开始解剖自己</button>
    </div>
  </div>

  <!-- ==================== 测试页 ==================== -->
  <div id="testPage" class="hidden">
    <div class="card">
      <div class="progress-wrap">
        <div class="progress-label"><span id="progText">第 1/20 题</span><span id="progPct">5%</span></div>
        <div class="progress-track"><div class="progress-fill" id="progFill" style="width:5%"></div></div>
      </div>
      <div id="qContainer"></div>
      <div class="nav-row">
        <button class="btn btn-nav" id="prevBtn" onclick="prev()">⬅ 上一题</button>
        <div class="q-dots" id="qDots"></div>
        <button class="btn btn-nav" id="nextBtn" onclick="next()" disabled>下一题 ➡</button>
      </div>
    </div>
  </div>

  <!-- ==================== 结果页 ==================== -->
  <div id="resultPage" class="hidden">
    <div class="result-wrap" id="resultWrap"></div>
    <button class="btn btn-restart" onclick="restart()">🔄 再测一次！（结果会变吗？）</button>
  </div>

</div>

<script>
// ===================== 数据 =====================

const dims = [
  { id: 'dim1', name: '社交模式', left: 'E', right: 'I',
    leftName: '组局狂魔（E）', rightName: '独自美丽（I）',
    lDesc: '球场上到处是你的熟人，群里@全员的那个人就是你', rDesc: '一个人来，一个人打，一个人走，安静且高效',
    color: '#e74c3c' },
  { id: 'dim2', name: '战斗风格', left: 'B', right: 'T',
    leftName: '暴力输出（B）', rightName: '优雅艺术（T）',
    lDesc: '每一拍都在和球有仇，大力出奇迹是你的座右铭', rDesc: '旋转、落点、节奏变化，网球在你手里是一门艺术',
    color: '#e67e22' },
  { id: 'dim3', name: '胜负执念', left: 'C', right: 'F',
    leftName: '冠军癌晚期（C）', rightName: '佛系养生（F）',
    lDesc: '输球能让你难受三天，记分牌比心跳还重要', rDesc: '输赢随缘，出汗就行，打完球去撸串才是正事',
    color: '#2ecc71' },
  { id: 'dim4', name: '训练模式', left: 'P', right: 'R',
    leftName: '计划狂魔（P）', rightName: '随缘玩家（R）',
    lDesc: '每周训练计划精确到分钟，下雨？室内练！', rDesc: '打球？看心情，看天气，看黄历，看星座运势',
    color: '#3498db' }
];

const questions = [
  // ========== 维度1：社交模式 (5题) ==========
  { dim: 'dim1', text: '周五下午，群里有人吼了一声"明早9点打球！"，你的第一反应是？', opts: [
    { emoji: '🔥', text: '秒回"11111"并开始规划明天穿哪套球衣', score: {dim1: 3} },
    { emoji: '👍', text: '回复"好的"然后默默把闹钟调到8点半', score: {dim1: 1} },
    { emoji: '🤔', text: '先看看都有谁去，人不对就说"哎呀明天有事"', score: {dim1: -1} },
    { emoji: '🙈', text: '装作没看见，明天睡到自然醒它不香吗', score: {dim1: -3} }
  ]},
  { dim: 'dim1', text: '你是那种会主动在朋友圈/群里喊人约球的人吗？', opts: [
    { emoji: '📢', text: '是我！群里的"球局发起人"称号不是白来的', score: {dim1: 3} },
    { emoji: '🤝', text: '偶尔会，但主要是熟人圈子里张罗', score: {dim1: 1} },
    { emoji: '📩', text: '基本不主动，但别人喊我一般都会去', score: {dim1: -1} },
    { emoji: '🏠', text: '约球？不如在家躺着。能单约绝不群发', score: {dim1: -3} }
  ]},
  { dim: 'dim1', text: '你对目前找球友/约球的整体感受是什么？', opts: [
    { emoji: '😤', text: '心累！找球友像大海捞针，约10次成1次', score: {dim1: 3} },
    { emoji: '😅', text: '还行吧，偶尔麻烦但能接受，凑合着打', score: {dim1: 1} },
    { emoji: '🙂', text: '挺顺利的，有固定圈子，不太需要找新人', score: {dim1: -1} },
    { emoji: '🤷', text: '无所谓。有人约就去，没人就自己练', score: {dim1: -3} }
  ]},
  { dim: 'dim1', text: '你理想中的球友是什么水平？', opts: [
    { emoji: '💀', text: '比我强两个档次！被虐才有进步，被暴打是最高礼遇', score: {dim1: 3} },
    { emoji: '⚖️', text: '差不多就行，势均力敌最好玩', score: {dim1: 1} },
    { emoji: '😎', text: '稍微比我弱一点点的…可以享受赢的快感', score: {dim1: -1} },
    { emoji: '🐣', text: '只要人品好、不鸽我，水平无所谓', score: {dim1: -3} }
  ]},
  { dim: 'dim1', text: '你在约球/找球友过程中遇到过最烦人的情况是？', opts: [
    { emoji: '🕊️', text: '被放鸽子！说好的局说没就没，白白浪费一个下午', score: {dim1: 3} },
    { emoji: '👻', text: '水平差距太大。报了3.0实际1.5，两边都尴尬', score: {dim1: 1} },
    { emoji: '🐂', text: '遇到黄牛/二道贩子。场地被加价倒卖，约球帖是钓鱼的', score: {dim1: -1} },
    { emoji: '💬', text: '沟通太累。确定时间/地点/人数要来回几十条消息', score: {dim1: -3} }
  ]},

  // ========== 维度2：战斗风格 (5题) ==========
  { dim: 'dim2', text: '比赛到30-30的关键分，你准备发球，脑子里想的是？', opts: [
    { emoji: '💣', text: '一发全力轰出去！不进算我的，进了算你的（输了）', score: {dim2: 3} },
    { emoji: '⚡', text: '八成力发个平击，先压制住，下一拍再解决', score: {dim2: 1} },
    { emoji: '🌀', text: '发个带切的外角球把对手拉出场外，然后上网截击', score: {dim2: -1} },
    { emoji: '🪄', text: '发个下手发球…谁说下手发球不能得分？（坏笑）', score: {dim2: -3} }
  ]},
  { dim: 'dim2', text: '最能描述你球风的是？', opts: [
    { emoji: '🦍', text: '底线猛男/女：站定了往死里抽，对手不跑吐算我输', score: {dim2: 3} },
    { emoji: '🐆', text: '进攻型全能：主要靠速度和力量压迫，偶尔变节奏', score: {dim2: 1} },
    { emoji: '🦊', text: '节奏大师：切削、高球、平击、上旋不停切换', score: {dim2: -1} },
    { emoji: '🐍', text: '防守反击型：磨到对手怀疑人生然后一击致命', score: {dim2: -3} }
  ]},
  { dim: 'dim2', text: '网球技术上，最让你头疼/卡住的地方是？', opts: [
    { emoji: '💥', text: '稳定性差。暴力是够了，但出界率也感人，经常自己打飞', score: {dim2: 3} },
    { emoji: '🐌', text: '速度和力量上不去。想加力但一加就失误，很憋屈', score: {dim2: 1} },
    { emoji: '🎯', text: '落点不够精准。脑子里想打角落，手上打中路', score: {dim2: -1} },
    { emoji: '🧊', text: '比赛中心态崩。训练猛如虎，一打比赛就手抖脚软', score: {dim2: -3} }
  ]},
  { dim: 'dim2', text: '如果网球之神给你一个技能点，你加在哪儿？', opts: [

// ===================== 应用 =====================
let curQ = 0;
let scores = { dim1: 0, dim2: 0, dim3: 0, dim4: 0 };
let answers = new Array(questions.length).fill(null);

function start() {
  document.getElementById('introPage').classList.add('hidden');
  document.getElementById('testPage').classList.remove('hidden');
  document.getElementById('resultPage').classList.add('hidden');
  curQ = 0; scores = { dim1: 0, dim2: 0, dim3: 0, dim4: 0 };
  answers = new Array(questions.length).fill(null);
  renderQContainer();
  showQ(0);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderQContainer() {
  const c = document.getElementById('qContainer');
  c.innerHTML = questions.map((q, i) => `
    <div class="q-slide" id="slide${i}">
      <span class="q-badge">📋 第 ${i+1} 题 / ${questions.length}</span>
      <div class="q-title">${q.text}</div>
      <div class="opts">
        ${q.opts.map((o, oi) => `
          <button class="opt-btn" id="opt${i}_${oi}" onclick="pick(${i},${oi})">
            <span class="opt-emoji">${o.emoji}</span>
            <span>${o.text}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `).join('');

  // 题号小圆点
  const dots = document.getElementById('qDots');
  dots.innerHTML = questions.map((_, i) => `<span class="q-dot" id="dot${i}"></span>`).join('');
}

function showQ(i) {
  document.querySelectorAll('.q-slide').forEach(s => s.classList.remove('active'));
  document.getElementById('slide' + i)?.classList.add('active');
  document.getElementById('progText').textContent = `第 ${i+1}/${questions.length} 题`;
  document.getElementById('progPct').textContent = Math.round((i+1)/questions.length*100) + '%';
  document.getElementById('progFill').style.width = ((i+1)/questions.length*100) + '%';

  document.getElementById('prevBtn').disabled = (i === 0);
  document.getElementById('nextBtn').textContent = i === questions.length-1 ? '🎉 看结果！' : '下一题 ➡';
  document.getElementById('nextBtn').disabled = answers[i] === null;

  // 更新小圆点
  document.querySelectorAll('.q-dot').forEach((d, di) => {
    d.classList.remove('done', 'current');
    if (answers[di] !== null) d.classList.add('done');
    if (di === i) d.classList.add('current');
  });

  // 恢复选项高亮
  if (answers[i] !== null) {
    questions[i].opts.forEach((_, oi) => {
      document.getElementById(`opt${i}_${oi}`)?.classList.toggle('selected', oi === answers[i]);
    });
  }
}

function pick(qi, oi) {
  answers[qi] = oi;
  questions[qi].opts.forEach((_, oi2) => {
    document.getElementById(`opt${qi}_${oi2}`)?.classList.toggle('selected', oi2 === oi);
  });
  // auto-advance enabled, nextBtn kept for desktop fallback
  document.getElementById(`dot${qi}`)?.classList.add('done');
  // 选中选项后自动进入下一题
  var isLast = qi === questions.length - 1;
  setTimeout(function() {
    if (isLast) { calcResult(); return; }
    curQ++; showQ(curQ);
  }, 350);
}

function next() {
  if (answers[curQ] === null) return;
  if (curQ === questions.length - 1) { calcResult(); return; }
  curQ++; showQ(curQ);
}
function prev() { if (curQ > 0) { curQ--; showQ(curQ); } }

function calcResult() {
  // 计分
  scores = { dim1: 0, dim2: 0, dim3: 0, dim4: 0 };
  answers.forEach((ans, i) => {
    if (ans !== null) {
      const sc = questions[i].opts[ans].score;
      for (const [k, v] of Object.entries(sc)) scores[k] += v;
    }
  });

  const code =
    (scores.dim1 >= 0 ? 'E' : 'I') +
    (scores.dim2 >= 0 ? 'B' : 'T') +
    (scores.dim3 >= 0 ? 'C' : 'F') +
    (scores.dim4 >= 0 ? 'P' : 'R');

  const type = typeDB[code];
  if (!type) {
    var msg = '类型计算异常

';
    msg += '计算结果: ' + code + '
';
    msg += '分数详情:
';
    msg += '  社交 dim1=' + scores.dim1 + ' -> ' + (scores.dim1>=0?'E':'I') + '
';
    msg += '  战斗 dim2=' + scores.dim2 + ' -> ' + (scores.dim2>=0?'B':'T') + '
';
    msg += '  胜负 dim3=' + scores.dim3 + ' -> ' + (scores.dim3>=0?'C':'F') + '
';
    msg += '  训练 dim4=' + scores.dim4 + ' -> ' + (scores.dim4>=0?'P':'R') + '
';
    msg += '
已回答: ' + answers.filter(function(a){return a!==null;}).length + '/20 题';
    alert(msg);
    return;
  }

  // 各维度百分比
  const dimResults = dims.map((d, idx) => {
    const raw = scores[d.id]; // range: -15 to +15 (5 questions × -3 to +3)
    const pct = Math.round(50 + (raw / 15) * 50); // map to 0-100
    const clamped = Math.max(5, Math.min(95, pct));
    const isLeft = raw >= 0;
    return { ...d, pct: clamped, raw, result: isLeft ? d.leftName : d.rightName, isLeft };
  });

  // 渲染
  const wrap = document.getElementById('resultWrap');
  wrap.innerHTML = `
    <div class="result-hero">
      <span class="r-emoji">${type.emoji}</span>
      <div class="r-type">${type.code}</div>
      <div class="r-name">${type.name}</div>
      <div class="r-tagline">${type.title}</div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:14px;">📊 四个维度画像</h3>
      <div class="dim-bars">
        ${dimResults.map(d => `
          <div class="dim-bar-card" style="border-left:4px solid ${d.color};">
            <div class="dbc-head">
              <span class="dbc-label">${d.name}</span>
              <span class="dbc-result" style="color:${d.color};">${d.result}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:0.7em;color:#aaa;margin-bottom:4px;">
              <span>${d.leftName}</span><span>${d.rightName}</span>
            </div>
            <div class="dbc-bar">
              <div class="dbc-fill" style="width:${d.pct}%;background:${d.color};"></div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="card desc-card">
      <h3>🧐 球场人格解读</h3>
      <p>${type.desc}</p>
    </div>

    <div class="card">
      <h3>💡 给你的建议</h3>
      <p style="line-height:1.8;">${type.advice}</p>
    </div>

    <div class="card metaphor-card">
      <h3>🎭 抽象比喻三连击</h3>
      <div class="m-row">
        <div class="m-item">
          <div class="m-icon">${type.weapons.emoji}</div>
          <div class="m-label"><strong>${type.weapons.label}</strong><br><small>${type.weapons.note}</small></div>
        </div>
        <div class="m-item">
          <div class="m-icon">${type.animal.emoji}</div>
          <div class="m-label"><strong>${type.animal.label}</strong><br><small>${type.animal.note}</small></div>
        </div>
        <div class="m-item">
          <div class="m-icon">${type.weather.emoji}</div>
          <div class="m-label"><strong>${type.weather.label}</strong><br><small>${type.weather.note}</small></div>
        </div>
      </div>
    </div>

    <div class="card" style="text-align:center;color:#888;">
      <p>🎾 <strong>网球灵魂参考</strong><br><small>${type.celeb}</small></p>
    </div>
  `;

  // 显示结果
  document.getElementById('testPage').classList.add('hidden');
  document.getElementById('resultPage').classList.remove('hidden');
  wrap.classList.add('show');

  // 撒花
  spawnConfetti();

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function spawnConfetti() {
  const emojis = ['🎾','🎉','✨','🌟','🏆','💥','⚡','🔥','🎯','💪','🦁','🐆'];
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + '%';
      el.style.top = -(Math.random() * 100) + 'px';
      el.style.animationDuration = (2 + Math.random() * 3) + 's';
      el.style.animationDelay = '0s';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }, i * 60);
  }
}

function restart() {
  document.getElementById('resultPage').classList.add('hidden');
  document.getElementById('introPage').classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 键盘导航
document.addEventListener('keydown', e => {
  if (document.getElementById('testPage').classList.contains('hidden')) return;
  if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') prev();
  if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') { if (answers[curQ] !== null) next(); }
  if (e.key === '1') pick(curQ, 0);
  if (e.key === '2') pick(curQ, 1);
  if (e.key === '3') pick(curQ, 2);
  if (e.key === '4') pick(curQ, 3);
});
</script>
